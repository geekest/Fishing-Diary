name: FishingDiary
options:
  bundleIdPrefix: com.placeholder
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "15"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""  # TODO: 填入你的 Team ID
    TARGETED_DEVICE_FAMILY: "1"  # iPhone only
    # Xcode 推荐设置
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    DEAD_CODE_STRIPPING: YES
    SWIFT_COMPILATION_MODE: wholemodule
  configs:
    debug:
      SWIFT_COMPILATION_MODE: incremental

targets:
  FishingDiary:
    type: application
    platform: iOS
    bundleId: com.placeholder.FishingDiary
    sources:
      - path: FishingDiary
    resources:
      - path: FishingDiary/Resources
    info:
      path: FishingDiary/Resources/Info.plist
      properties:
        CFBundleDisplayName: "钓鱼日记"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        UILaunchScreen:
          UIColorName: AccentColor
        NSLocationWhenInUseUsageDescription: "用于自动记录钓点位置和获取当地天气数据"
        NSPhotoLibraryUsageDescription: "从相册选择渔获照片"
        NSCameraUsageDescription: "拍摄渔获照片"
        NSPhotoLibraryAddUsageDescription: "将分享图保存到相册"
    # entitlements: 暂时移除 WeatherKit + CloudKit（已 Mock，无需付费签名即可跑模拟器）
    # TODO: 准备上架时取消注释并填入真实 Team ID：
    # entitlements:
    #   path: FishingDiary/Resources/FishingDiary.entitlements
    #   properties:
    #     com.apple.developer.weatherkit: true
    #     com.apple.developer.icloud-container-identifiers:
    #       - iCloud.<your.bundle.id>
    #     com.apple.developer.icloud-services:
    #       - CloudKit
    settings:
      base:
        INFOPLIST_FILE: FishingDiary/Resources/Info.plist
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: TOCropViewController
    swift_packages: []

packages:
  TOCropViewController:
    url: https://github.com/TimOliver/TOCropViewController
    minorVersion: "2.7.4"
